<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decentralized Voting System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- Login Page -->
    <div id="loginPage" class="container text-center mt-5">
        <div class="card shadow p-5 mx-auto" style="max-width: 500px;">
            <h1 class="mb-4">🗳️ Decentralized Voting</h1>
            <p>Connect your MetaMask wallet to start voting</p>
            <button id="connectWalletBtn" class="btn btn-primary btn-lg">Connect MetaMask</button>
        </div>
    </div>

    <!-- Main App (hidden until login) -->
    <div id="app" style="display: none;">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container">
                <a class="navbar-brand" href="#">🗳️ Voting DApp</a>
                <div class="navbar-nav ms-auto">
                    <button class="nav-link btn btn-link text-white" id="navVote">Vote</button>
                    <button class="nav-link btn btn-link text-white" id="navResults">Results</button>
                    <button id="navAdminDashboard" class="nav-link btn btn-link text-white" style="display: none;">Admin Dashboard</button>
                    <button id="navCreateElection" class="nav-link btn btn-link text-white" style="display: none;">Create Election</button>
                    <button class="nav-link btn btn-link text-danger" id="logoutBtn">Logout</button>
                </div>
            </div>
        </nav>

        <div class="container mt-4">
            <!-- Vote Section -->
            <div id="voteSection" class="section">
                <h2>Active Elections</h2>
                <div id="activeElectionsList" class="row"></div>
            </div>

            <!-- Results Section -->
            <div id="resultsSection" class="section" style="display: none;">
                <h2>Election Results</h2>
                <div id="resultsList"></div>
            </div>

            <!-- Admin Dashboard Section -->
            <div id="adminDashboardSection" class="section" style="display: none;">
                <h2>Admin Dashboard</h2>
                <div class="row mb-4">
                    <div class="col-md-3">
                        <div class="card text-white bg-primary mb-3">
                            <div class="card-header">Total Users</div>
                            <div class="card-body">
                                <h3 id="totalUsers" class="card-title">0</h3>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card text-white bg-success mb-3">
                            <div class="card-header">Total Elections</div>
                            <div class="card-body">
                                <h3 id="totalElections" class="card-title">0</h3>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card text-white bg-warning mb-3">
                            <div class="card-header">Active Elections</div>
                            <div class="card-body">
                                <h3 id="activeElections" class="card-title">0</h3>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card text-white bg-info mb-3">
                            <div class="card-header">Total Votes Cast</div>
                            <div class="card-body">
                                <h3 id="totalVotesCast" class="card-title">0</h3>
                            </div>
                        </div>
                    </div>
                </div>
                <h3>Manage Elections</h3>
                <div id="adminElectionsList"></div>
            </div>

            <!-- Create Election Section -->
            <div id="createElectionSection" class="section" style="display: none;">
                <h2>Create New Election</h2>
                <form id="createElectionForm">
                    <div class="mb-3">
                        <label class="form-label">Election Title</label>
                        <input type="text" id="electionTitle" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Candidates</label>
                        <div id="candidatesInputs">
                            <input type="text" class="form-control mb-2 candidate-input" placeholder="Candidate 1" required>
                            <input type="text" class="form-control mb-2 candidate-input" placeholder="Candidate 2" required>
                        </div>
                        <button type="button" id="addCandidateBtn" class="btn btn-secondary btn-sm">+ Add Candidate</button>
                    </div>
                    <button type="submit" class="btn btn-primary">Create Election</button>
                </form>
                <div id="createElectionMessage" class="mt-3"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/ethers@6.7.0/dist/ethers.umd.min.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
